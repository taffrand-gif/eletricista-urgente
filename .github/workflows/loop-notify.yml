name: Loop PR Notify

on:
  pull_request:
    types: [opened]
    branches: [main]

jobs:
  notify:
    if: startsWith(github.head_ref, 'loop/')
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          MSG="🔁 *Loop PR ouverte*%0A%0A*$PR_TITLE*%0A%0A✅ Merge: $PR_URL"
          curl -s "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage"             -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}&text=$MSG&parse_mode=Markdown"
